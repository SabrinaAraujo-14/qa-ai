<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA.AI - Gerador Inteligente de Testes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-robot"></i> QA.AI</h1>
            <p>Transforme requisitos em testes automaticamente</p>
        </header>

        <main>
            <div class="input-section">
                <textarea 
                    id="requirement" 
                    placeholder="Cole aqui sua história de usuário ou requisito funcional...
Exemplo: 'Usuário deve conseguir fazer login com e-mail e senha válidos.'"
                    rows="6"
                ></textarea>
                <button id="generateBtn" class="generate-btn">
                    <i class="fas fa-magic"></i> Gerar Testes
                </button>
            </div>

            <div id="loading" class="loading hidden">
                <i class="fas fa-spinner fa-spin"></i> Gerando testes com IA...
            </div>

            <div id="results" class="results hidden">
                <div class="results-header">
                    <h2><i class="fas fa-check-circle"></i> Testes Gerados</h2>
                    <button id="copyBtn" class="copy-btn">
                        <i class="fas fa-copy"></i> Copiar
                    </button>
                </div>
                <div id="testContent" style="white-space: pre-wrap;"></div>
            </div>

            <div id="error" class="error hidden"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
